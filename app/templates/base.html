<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}SleeperStack{% endblock %}</title>
  <link rel="stylesheet" href="/static/vendor/pico.min.css">
  <script src="/static/vendor/htmx.min.js"></script>
  <style>
    form.inline { display: inline-block; margin: 0 0.25rem 0 0; }
    td.badge-running { color: var(--pico-ins-color); font-weight: 600; }
    td.badge-exited { color: var(--pico-muted-color); }
    code { word-break: break-all; }
  </style>
</head>
<body>
  {% if user %}
  <header class="container">
    <nav>
      <ul>
        <li><strong>💤 SleeperStack</strong></li>
      </ul>
      <ul>
        <li><a href="/dashboard">Dashboard</a></li>
        <li><a href="/rules">Rules</a></li>
        <li><a href="/endpoints">Endpoints</a></li>
        <li><a href="/history">History</a></li>
        <li><a href="/inventory">Inventory</a></li>
        <li>
          <form class="inline" method="post" action="/logout">
            <button type="submit" class="outline secondary">Logout</button>
          </form>
        </li>
      </ul>
    </nav>
  </header>
  {% endif %}
  <main class="container">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
