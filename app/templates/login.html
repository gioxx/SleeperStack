{% extends "base.html" %}
{% block title %}Login - SleeperStack{% endblock %}
{% block content %}
<article style="max-width: 420px; margin: 3rem auto;">
  <hgroup>
    <h1>💤 SleeperStack</h1>
    <p>Sign in to manage your Portainer environments</p>
  </hgroup>
  {% if error %}<p style="color: var(--pico-del-color);">{{ error }}</p>{% endif %}
  <form method="post" action="/login">
    <label>Username
      <input type="text" name="username" required autofocus>
    </label>
    <label>Password
      <input type="password" name="password" required>
    </label>
    <button type="submit">Log in</button>
  </form>
</article>
{% endblock %}
